<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>In the Pursuit of Unicorns — Locations</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
@keyframes twinkle{from{opacity:.08}to{opacity:.7}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
:root{--bg:#04040f;--surface:#09091a;--gold:#c9a84c;--text:#d4c9a8;--muted:#5a5044;--dim:#8a7e64;}
html{scroll-behavior:smooth}
body{background:var(--bg);font-family:'EB Garamond',serif;color:var(--text);min-height:100vh;overflow-x:hidden;}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:3rem 1.25rem 5rem;}
.hd{text-align:center;margin-bottom:2.75rem}
.hd-title{font-family:'Cinzel',serif;font-size:clamp(1.9rem,5vw,2.8rem);font-weight:700;letter-spacing:.14em;color:var(--gold);text-shadow:0 0 60px rgba(201,168,76,.28);}
.hd-sub{margin-top:.4rem;font-size:.72rem;letter-spacing:.32em;text-transform:uppercase;color:#6c6052;}
.tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:1.75rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:120px;padding:.7rem .5rem;background:none;border:none;border-bottom:2px solid transparent;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.09em;text-transform:uppercase;color:#2e2840;cursor:pointer;transition:color .2s,border-color .2s,text-shadow .2s;white-space:nowrap;text-align:center;}
.tab:hover:not(.active){color:#5a4e70}
.tab.active{color:var(--cc);border-bottom-color:var(--cc);text-shadow:0 0 18px var(--cg);}
.panel{display:none}
.panel.active{display:block;animation:fadeUp .3s ease}
.card{border:1px solid rgba(255,255,255,.055);border-radius:3px;overflow:hidden;background:var(--surface);margin-bottom:1.25rem;}
.card:last-child{margin-bottom:0}
.loc-hd{padding:1.75rem 2.25rem;border-bottom:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden;}
.loc-hd::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--cc);opacity:.85;}
.loc-name{font-family:'Cinzel',serif;font-size:1.85rem;font-weight:700;letter-spacing:.07em;line-height:1;color:var(--cc);text-shadow:0 0 35px var(--cg);}
.loc-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.55rem;}
.loc-tag{display:inline-block;padding:.18rem .75rem;border:1px solid rgba(255,255,255,.1);color:var(--cc);font-family:'Cinzel',serif;font-size:.63rem;letter-spacing:.12em;border-radius:2px;opacity:.75;}
.loc-quote{margin-top:.9rem;font-style:italic;color:#a69778;font-size:1.05rem;line-height:1.65;max-width:62ch;}
.loc-lore{margin-top:.65rem;color:#918cac;font-size:1.05rem;line-height:1.75;}
.loc-lore+.loc-lore{margin-top:.5rem}
.sec-lbl{padding:.4rem 2.25rem;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;color:var(--cc);opacity:.45;background:rgba(0,0,0,.22);border-bottom:1px solid rgba(255,255,255,.025);}
.row{padding:1.15rem 2.25rem;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s;}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(255,255,255,.01)}
.row-top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.35rem .75rem;margin-bottom:.4rem;}
.row-name{font-family:'Cinzel',serif;font-size:1.2rem;font-weight:600;color:#ddd0a8;letter-spacing:.03em;}
.row-meta{font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.06em;color:var(--cc);opacity:.65;text-align:right;flex-shrink:0;}
.row-desc{font-size:1.05rem;color:#afa899;line-height:1.68;}
.row-desc em{color:#928673;font-style:italic}
.row-desc strong{color:#d8ceb2;font-style:normal}
.row-desc p{margin-top:.65rem}
.row-desc p:first-child{margin-top:0}
.bliss-badge{display:inline-block;padding:.1rem .6rem;border-radius:2px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.18);color:var(--gold);margin-left:.5rem;vertical-align:middle;}
.xbtn{margin-top:.75rem;display:inline-flex;align-items:center;gap:.35rem;padding:.22rem .7rem;background:none;border:1px solid color-mix(in srgb,var(--cc) 55%,transparent);color:var(--cc);font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;opacity:1;border-radius:2px;transition:background .2s,border-color .2s,color .2s;}
.xbtn:hover{border-color:var(--cc);background:color-mix(in srgb,var(--cc) 14%,transparent);color:#fff}
.xtbl{display:none;margin-top:.85rem;animation:fadeUp .2s ease}
.xtbl.open{display:block}
table{width:100%;border-collapse:collapse;font-size:.87rem}
thead th{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--cc);opacity:.6;text-align:left;padding:.38rem .55rem;border-bottom:1px solid rgba(255,255,255,.06);}
tbody td{padding:.52rem .55rem;color:var(--dim);border-bottom:1px solid rgba(255,255,255,.025);vertical-align:top;line-height:1.55;}
tbody tr:last-child td{border-bottom:none}
tbody td:first-child{color:#ccc0a0;font-weight:500}
tbody td em{color:#7f7865;font-style:italic}
tbody td strong{color:#c4b898}
.mechbox{margin:0 2.25rem 1.25rem;padding:.9rem 1.15rem;border:1px solid rgba(255,255,255,.05);border-left:2px solid var(--cc);border-radius:2px;background:rgba(0,0,0,.18);}
.mechbox-title{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--cc);opacity:.65;margin-bottom:.6rem;}
.mechbox ul{list-style:none;padding:0;}
.mechbox li{font-size:1rem;color:#8a7e64;line-height:1.65;padding:.2rem 0 .2rem 1.1em;position:relative;}
.mechbox li::before{content:'·';position:absolute;left:0;color:var(--cc);opacity:.5;}
.mechbox li strong{color:#c0b498}
.mechbox li em{color:#7f7865;font-style:italic}
.dm-note{margin:0 2.25rem 1.5rem;padding:.85rem 1.1rem;border:1px solid rgba(255,255,255,.035);border-left:2px solid rgba(255,255,255,.08);border-radius:2px;background:rgba(255,255,255,.012);font-style:italic;font-size:.97rem;color:#625a50;line-height:1.72;}
.dm-note strong{color:#6e6454;font-style:normal}
.trap-num{display:inline-block;width:1.6em;height:1.6em;line-height:1.6em;text-align:center;font-family:'Cinzel',serif;font-size:.65rem;font-weight:700;border:1px solid rgba(255,255,255,.12);border-radius:2px;color:var(--cc);opacity:.8;margin-right:.5rem;vertical-align:middle;flex-shrink:0;}
.trap-row{display:flex;align-items:flex-start;gap:.5rem;padding:.5rem 0;border-bottom:1px solid rgba(255,255,255,.025);}
.trap-row:last-child{border-bottom:none}
.trap-body{font-size:1rem;color:#afa899;line-height:1.6;flex:1;}
.trap-body strong{color:#d8ceb2}
.trap-body em{color:#928673;font-style:italic}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#22203a;border-radius:2px}
@media(max-width:560px){
  .loc-hd,.row,.sec-lbl,.mechbox,.dm-note{padding-left:1.25rem;padding-right:1.25rem}
  .loc-name{font-size:1.5rem}
  .row-top{flex-direction:column;gap:.2rem}
  .row-meta{text-align:left}
}
@media(min-width:1024px){html{font-size:120%}}
.back{display:inline-block;margin-top:2.5rem;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.back:hover{color:var(--dim)}
</style>
</head>
<body>
<div id="stars"></div>
<div class="wrap">
  <header class="hd">
    <h1 class="hd-title">In the Pursuit of Unicorns</h1>
    <p class="hd-sub">Locations</p>
  </header>

  <nav class="tabs" id="tabs" role="tablist" aria-label="Locations"></nav>

  <main id="main">
</main>
  <a class="back" href="dm.html">← back to dm cabinet</a>
</div>

<script>
(function(){
  var el=document.getElementById('stars');
  for(var i=0;i<160;i++){
    var s=document.createElement('div');s.className='star';
    var sz=Math.random()*1.6+.3;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;animation:twinkle '+(2+Math.random()*3.5)+'s '+(Math.random()*4)+'s infinite alternate';
    el.appendChild(s);
  }
})();

function xtoggle(btn,id){
  var tbl=document.getElementById(id);
  var open=tbl.classList.toggle('open');
  btn.textContent=open?btn.dataset.close:btn.dataset.open;
}

function renderItem(item){
  if(item.type==='mechbox'){
    return '<div class="mechbox"><div class="mechbox-title">'+item.title+'</div><ul>'+item.items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul></div>';
  }
  if(item.type==='dm-note'){
    return '<div class="dm-note"><strong>'+item.label+'</strong> '+item.text+'</div>';
  }
  if(item.type==='row'){
    var nameH=item.name?'<span class="row-name">'+item.name+'</span>':'';
    if(item.badge)nameH+='<span class="bliss-badge">'+item.badge+'</span>';
    var metaH=item.meta?'<span class="row-meta">'+item.meta+'</span>':'';
    var topH=(nameH||metaH)?'<div class="row-top">'+nameH+metaH+'</div>':'';
    var descH='';
    if(item.desc){
      var ps=item.desc.map(function(p){return '<p>'+p+'</p>';}).join('');
      var noteP=item.note?'<p style="margin-top:.5rem;font-style:italic;color:#7a7260">'+item.note+'</p>':'';
      descH='<div class="row-desc">'+ps+noteP+'</div>';
    }
    var trapsH=item.traps?item.traps.map(function(t){return '<div class="trap-row"><span class="trap-num">'+t.num+'</span><div class="trap-body">'+t.text+'</div></div>';}).join(''):'';
    var tblH='';
    if(item.table){
      var t=item.table;
      var hdr=t.headers?'<thead><tr>'+t.headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr></thead>':'';
      var rows=t.rows.map(function(r){
        if(r.length===1&&r[0].colspan)return '<tr><td colspan="'+r[0].colspan+'">'+r[0].html+'</td></tr>';
        return '<tr>'+r.map(function(c){return '<td>'+c+'</td>';}).join('')+'</tr>';
      }).join('');
      tblH='<button class="xbtn" data-open="'+t.btnOpen+'" data-close="'+t.btnClose+'" onclick="xtoggle(this,\''+t.id+'\')">'+t.btnOpen+'</button>'+'<div class="xtbl" id="'+t.id+'"><table>'+hdr+'<tbody>'+rows+'</tbody></table></div>';
    }
    return '<div class="row">'+topH+descH+trapsH+tblH+'</div>';
  }
  return '';
}

function renderSection(s){
  return '<div class="sec-lbl">'+s.label+'</div>'+s.items.map(renderItem).join('');
}

fetch('data/locations.json').then(function(r){return r.json();}).then(function(locs){
  var tabs=document.getElementById('tabs');
  var main=document.getElementById('main');
  tabs.innerHTML=locs.map(function(l,i){
    return '<button class="tab'+(i===0?' active':'')+'" role="tab" data-i="'+i+'" style="--cc:'+l.color+';--cg:'+l.tabGlow+'">'+l.tab+'</button>';
  }).join('');
  locs.forEach(function(l,i){
    var sec=document.createElement('section');
    sec.className='panel'+(i===0?' active':'');
    sec.id='p'+i;
    sec.style.cssText='--cc:'+l.color+';--cg:'+l.glow;
    var tagsH=l.tags.map(function(t){return '<span class="loc-tag">'+t+'</span>';}).join('');
    var loreH=l.lore.map(function(p){return '<p class="loc-lore">'+p+'</p>';}).join('');
    sec.innerHTML=
      '<div class="card"><div class="loc-hd">'+
      '<h2 class="loc-name">'+l.name+'</h2>'+
      '<div class="loc-tags">'+tagsH+'</div>'+
      (l.quote?'<p class="loc-quote">'+l.quote+'</p>':'')+
      loreH+'</div>'+
      l.sections.map(renderSection).join('')+'</div>';
    main.appendChild(sec);
  });
  tabs.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click',function(){
      tabs.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
      main.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
      btn.classList.add('active');
      document.getElementById('p'+btn.dataset.i).classList.add('active');
    });
  });
});
</script>
</body>
</html>
