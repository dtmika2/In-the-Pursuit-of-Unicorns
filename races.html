<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>In the Pursuit of Unicorns - Races</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes twinkle{from{opacity:.08}to{opacity:.7}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

:root{
  --bg:#04040f;
  --surface:#09091a;
  --gold:#c9a84c;
  --text:#d4c9a8;
  --muted:#5a5044;
  --dim:#8a7e64;
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  font-family:'EB Garamond',serif;
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

#stars{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}
.star{
  position:absolute;background:#fff;border-radius:50%;
}

.wrap{
  position:relative;z-index:1;
  max-width:860px;margin:0 auto;
  padding:3rem 1.25rem 5rem;
}

/* ── Header ── */
.hd{text-align:center;margin-bottom:2.75rem}
.hd-title{
  font-family:'Cinzel',serif;
  font-size:clamp(1.9rem,5vw,2.8rem);
  font-weight:700;letter-spacing:.14em;
  color:var(--gold);
  text-shadow:0 0 60px rgba(201,168,76,.28);
}
.hd-sub{
  margin-top:.4rem;
  font-size:.72rem;letter-spacing:.32em;
  text-transform:uppercase;color:#6c6052;
}

/* ── Tabs ── */
.tabs{
  display:flex;
  border-bottom:1px solid rgba(255,255,255,.05);
  margin-bottom:1.75rem;
  overflow-x:auto;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}

.tab{
  flex:1;min-width:110px;
  padding:.7rem .5rem;
  background:none;border:none;
  border-bottom:2px solid transparent;
  font-family:'Cinzel',serif;
  font-size:.63rem;letter-spacing:.08em;
  text-transform:uppercase;
  color:#b8a5f1;cursor:pointer;
  transition:color .2s,border-color .2s,text-shadow .2s;
  white-space:nowrap;text-align:center;
}
.tab:hover:not(.active){color:#5a4e70}
.tab.active{
  color:var(--cc);
  border-bottom-color:var(--cc);
  text-shadow:0 0 18px var(--cg);
}

/* ── Panels ── */
.panel{display:none}
.panel.active{display:block;animation:fadeUp .3s ease}

/* ── Card ── */
.card{
  border:1px solid rgba(255,255,255,.055);
  border-radius:3px;overflow:hidden;
  background:var(--surface);
}

/* ── Race header ── */
.cls-hd{
  padding:1.75rem 2.25rem;
  border-bottom:1px solid rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.cls-hd::before{
  content:'';position:absolute;
  top:0;left:0;width:3px;height:100%;
  background:var(--cc);opacity:.85;
}
.cls-name{
  font-family:'Cinzel',serif;
  font-size:1.85rem;font-weight:700;
  letter-spacing:.07em;line-height:1;
  color:var(--cc);
  text-shadow:0 0 35px var(--cg);
}
.cls-role{
  margin-top:.35rem;
  font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);
}
.cls-stats{
  display:flex;flex-wrap:wrap;gap:.4rem;
  margin-top:.7rem;
}
.cls-mod{
  display:inline-block;
  padding:.18rem .75rem;
  border:1px solid rgba(255,255,255,.1);
  color:var(--cc);
  font-family:'Cinzel',serif;
  font-size:.68rem;letter-spacing:.12em;
  border-radius:2px;
}
.cls-flavor{
  margin-top:.9rem;
  font-style:italic;color:#a69778;
  font-size:1.05rem;line-height:1.65;
}
.cls-lore{
  margin-top:.75rem;
  color:#918cac;
  font-size:1.05rem;line-height:1.7;
  border-top:1px solid rgba(255,255,255,.04);
  padding-top:.75rem;
}

/* ── Section label ── */
.sec-lbl{
  padding:.4rem 2.25rem;
  font-family:'Cinzel',serif;
  font-size:.58rem;letter-spacing:.28em;
  text-transform:uppercase;
  color:#ee81a2;
  background:rgba(0,0,0,.22);
  border-bottom:1px solid rgba(255,255,255,.025);
}
.sec-lbl.active-lbl{
  color:#85ee81;
}

/* ── Ability rows ── */
.ab{
  padding:1.15rem 2.25rem;
  border-bottom:1px solid rgba(255,255,255,.03);
  transition:background .15s;
}
.ab:last-child{border-bottom:none}
.ab:hover{background:rgba(255,255,255,.012)}

.ab-top{
  display:flex;align-items:baseline;
  justify-content:space-between;
  flex-wrap:wrap;gap:.4rem .75rem;
  margin-bottom:.4rem;
}
.ab-name{
  font-family:'Cinzel',serif;
  font-size:1.22rem;font-weight:600;
  color:#ddd0a8;letter-spacing:.03em;
}
.ab-mech{
  font-family:'Cinzel',serif;
  font-size:.95rem;letter-spacing:.06em;
  color:var(--cc);opacity:.72;
  text-align:right;flex-shrink:0;
}
.ab-desc{
  font-size:1.112rem;color:#afa899;line-height:1.65;
}
.ab-desc em{color:#a69778;font-style:italic}
.ab-desc strong{color:#d8ceb2;font-style:normal}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#22203a;border-radius:2px}

@media(max-width:560px){
  .cls-hd,.ab,.sec-lbl{padding-left:1.25rem;padding-right:1.25rem}
  .cls-name{font-size:1.5rem}
  .ab-top{flex-direction:column;gap:.2rem}
  .ab-mech{text-align:left}
}
@media(min-width:1024px){
  html{font-size:120%}
  .cls-lore{font-size:.95rem}
  .ab-desc{font-size:1rem}
}
.back{display:inline-block;margin-top:2.5rem;font-size:.7rem;letter-spacing:.22em;text-transform:uppercase;color:#c840b6;text-decoration:none;transition:color .2s}
.back:hover{color:#e05555}
.back-top{margin-top:.9rem;margin-bottom:-.9rem}

/* ── Panel image ── */
.cls-img{width:100%;max-height:90px;overflow:hidden;position:relative;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:max-height .45s ease}
.cls-img.open{max-height:420px}
.cls-img img{width:100%;height:420px;object-fit:cover;object-position:center top;filter:brightness(.82) saturate(.75);display:block}
.cls-img::after{content:'▼';position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(transparent,var(--surface));pointer-events:none;display:flex;align-items:flex-end;justify-content:center;padding-bottom:.45rem;font-size:.65rem;color:rgba(255,255,255,.3)}
.cls-img.open::after{content:'▲';height:50px}

/* ── Expand button ── */
.xbtn{
  margin-top:.75rem;
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.22rem .7rem;
  background:none;
  border:1px solid color-mix(in srgb,var(--cc) 55%,transparent);
  color:var(--cc);
  font-family:'Cinzel',serif;
  font-size:.62rem;letter-spacing:.12em;
  text-transform:uppercase;cursor:pointer;
  opacity:1;border-radius:2px;
  transition:background .2s,border-color .2s,color .2s;
}
.xbtn:hover{border-color:var(--cc);background:color-mix(in srgb,var(--cc) 14%,transparent);color:#fff}
</style>
</head>
<body>

<div id="stars"></div>

<div class="wrap">

  <header class="hd">
    <h1 class="hd-title">In the Pursuit of Unicorns</h1>
    <p class="hd-sub">Playable Races</p>
  </header>

  <a class="back back-top" href="index.html">← back to main</a>

  <nav class="tabs" id="tabs" role="tablist" aria-label="Races"></nav>

  <main id="main"></main>
  <a class="back" href="index.html">← back to main</a>
</div>

<script>
(function(){
  const el=document.getElementById('stars');
  for(let i=0;i<160;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*1.6+.3;
    s.style.cssText='left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;width:'+sz+'px;height:'+sz+'px;animation:twinkle '+(2+Math.random()*3.5)+'s '+(Math.random()*4)+'s infinite alternate';
    el.appendChild(s);
  }
})();

function ab(a){
  return '<div class="ab"><div class="ab-top"><span class="ab-name">'+a.name+'</span><span class="ab-mech">'+a.mech+'</span></div><p class="ab-desc">'+a.desc+'</p></div>';
}

fetch('data/races.json').then(r=>r.json()).then(races=>{
  const tabs=document.getElementById('tabs');
  const main=document.getElementById('main');
  tabs.innerHTML=races.map((r,i)=>'<button class="tab'+(i===0?' active':'')+'" role="tab" data-i="'+i+'" style="--cc:'+r.color+';--cg:'+r.tabGlow+'">'+r.tab+'</button>').join('');
  races.forEach((r,i)=>{
    const sec=document.createElement('section');
    sec.className='panel'+(i===0?' active':'');
    sec.id='p'+i;
    sec.style.cssText='--cc:'+r.color+';--cg:'+r.glow;
    sec.innerHTML=
      '<div class="card">'+
        '<div class="cls-img"><img src="'+r.image+'" alt="'+r.name+'"></div>'+
        '<div class="cls-hd">'+
          '<h2 class="cls-name">'+r.name+'</h2>'+
          '<p class="cls-role">'+r.role+'</p>'+
          '<div class="cls-stats">'+r.mods.map(m=>'<span class="cls-mod">'+m+'</span>').join('')+'</div>'+
          '<p class="cls-flavor">'+r.flavor+'</p>'+
          '<p class="cls-lore">'+r.lore+'</p>'+
        '</div>'+
        '<div class="sec-lbl">Passive Ability</div>'+ab(r.passive)+
        '<div class="sec-lbl active-lbl">Active Ability</div>'+ab(r.active)+
      '</div>';
    main.appendChild(sec);
    sec.querySelector('.cls-img').addEventListener('click',function(){this.classList.toggle('open');});
  });
  tabs.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
    tabs.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    main.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('p'+btn.dataset.i).classList.add('active');
  }));
});
</script>
</body>
</html>
