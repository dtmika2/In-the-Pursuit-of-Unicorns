<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>In Search of Unicorns — DM Cabinet</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

:root{
  --bg:#04040f;
  --surface:#09091a;
  --gold:#c9a84c;
  --text:#d4c9a8;
  --muted:#5a5044;
  --dim:#8a7e64;
  --red:#b06060;
  --red-dim:rgba(160,60,60,.25);
  --red-glow:rgba(160,50,50,.18);
}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  font-family:'EB Garamond',serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow-x:hidden;
}

#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

.wrap{
  position:relative;z-index:1;
  max-width:860px;width:100%;
  padding:4rem 1.5rem 5rem;
  text-align:center;
  animation:fadeUp .8s ease both;
}

.hd-title{
  font-family:'Cinzel',serif;
  font-size:clamp(2rem,6vw,3.2rem);
  font-weight:700;
  letter-spacing:.14em;
  color:var(--red);
  text-shadow:0 0 80px rgba(160,60,60,.35);
  line-height:1.2;
}

.hd-sub{
  margin-top:.55rem;
  font-size:.7rem;
  letter-spacing:.32em;
  text-transform:uppercase;
  color:var(--muted);
}

.divider{
  width:120px;
  height:1px;
  background:linear-gradient(to right,transparent,var(--red),transparent);
  margin:2.5rem auto;
  opacity:.5;
}

.cards{
  display:flex;
  flex-direction:column;
  gap:1.25rem;
}

.card{
  display:block;
  background:var(--surface);
  border:1px solid var(--red-dim);
  border-radius:6px;
  padding:1.6rem 2rem;
  text-decoration:none;
  color:var(--text);
  transition:border-color .25s,box-shadow .25s,transform .2s;
}
.card:hover{
  border-color:rgba(180,70,70,.55);
  box-shadow:0 0 28px var(--red-glow);
  transform:translateY(-2px);
}

.card-title{
  font-family:'Cinzel',serif;
  font-size:1.15rem;
  font-weight:600;
  letter-spacing:.1em;
  color:var(--red);
  margin-bottom:.35rem;
}

.card-desc{
  font-size:.95rem;
  color:#a69778;
  font-style:italic;
}

.back{
  display:inline-block;
  margin-top:2.5rem;
  font-size:.7rem;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
  text-decoration:none;
  transition:color .2s;
}
.back:hover{color:var(--dim)}
@media(min-width:1024px){html{font-size:120%}}

.footer{
  margin-top:1rem;
  font-size:.7rem;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--muted);
}
</style>
</head>
<body>
<canvas id="stars"></canvas>

<div class="wrap">
  <h1 class="hd-title">Dungeon Master Cabinet</h1>
  <p class="hd-sub">Restricted Access &nbsp;·&nbsp; In Search of Unicorns</p>

  <div class="divider"></div>

  <div class="cards">
    <a class="card" href="eternal_night_locations.html">
      <div class="card-title">Locations</div>
      <div class="card-desc">Maps, descriptions &amp; secrets of the world</div>
    </a>
  </div>

  <a class="back" href="index.html">← back to main</a>
  <p class="footer">Dungeon Master eyes only</p>
</div>

<script>
(function(){
  const canvas=document.getElementById('stars');
  const ctx=canvas.getContext('2d');
  let stars=[];
  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
  function init(){
    resize();stars=[];
    for(let i=0;i<160;i++){
      const r=Math.random()*1.1+.2;
      stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r,
        op:Math.random(),spd:.004+Math.random()*.008,dir:Math.random()>.5?1:-1});
    }
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const s of stars){
      s.op+=s.spd*s.dir;
      if(s.op>=.75||s.op<=.06)s.dir*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.op})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',init);
  init();draw();
})();
</script>
</body>
</html>
